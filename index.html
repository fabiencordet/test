<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Logiciel Médical</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">

        // 1. LES DONNÉES DE TEST
        const mockPatient = {
            id: "p1",
            nom: "Martin",
            prenom: "Sophie",
            dateNaissance: "12/04/1984",
            antecedents: "Myopie forte, Suspicion de glaucome",
            prisesEnCharge: [
                {
                    id: "pec-1",
                    date: "15/01/2026",
                    statut: "Terminée",
                    conclusion: "Tension oculaire stable, à surveiller dans 6 mois.",
                    examens: [
                        {
                            id: "ex-1",
                            nom: "Examen de contrôle annuel",
                            observationsTextuelles: { anamnese: "Pas de plainte visuelle majeure", motif: "Contrôle" },
                            observationsStructurees: { tensionOD: 16, tensionOG: 15 },
                            conclusion: "RAS"
                        }
                    ]
                }
            ]
        };

        // 2. COMPOSANT FIL D'ARIANE
        function Breadcrumbs({ currentView, onViewChange }) {
            return (
                <nav class="flex mb-4 text-sm text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <ol class="inline-flex items-center space-x-1">
                        <li>
                            <button onClick={() => onViewChange('patient')} class="hover:text-blue-600 font-medium cursor-pointer">
                                Patient: {mockPatient.prenom} {mockPatient.nom}
                            </button>
                        </li>
                        {currentView === 'prise-en-charge' && (
                            <li class="inline-flex items-center">
                                <span class="mx-2 text-gray-400">/</span>
                                <span class="text-gray-900 font-semibold">Nouvelle Consultation (Saisie Active)</span>
                            </li>
                        )}
                    </ol>
                </nav>
            );
        }

        // 3. COMPOSANT PANNEAU LATÉRAL HISTORIQUE
        function HistorySidebar({ history }) {
            return (
                <aside class="w-80 bg-slate-900 text-gray-100 p-4 overflow-y-auto border-r border-slate-700 h-full">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">
                        📖 Historique (Lecture seule)
                    </h3>
                    <div class="space-y-6">
                        {history.map((pec) => (
                            <div key={pec.id} class="border-l-2 border-blue-500 pl-3 py-1">
                                <p class="text-xs text-blue-400 font-semibold">PEC du {pec.date}</p>
                                <p class="text-xs font-medium text-gray-300 italic mb-2">{pec.conclusion || "Aucune conclusion"}</p>
                                
                                {pec.examens.map((ex) => (
                                    <div key={ex.id} class="mt-2 bg-slate-800 p-2 rounded text-xs space-y-1">
                                        <p class="font-semibold text-gray-200">{ex.nom}</p>
                                        <p class="text-slate-400">Tension OD/OG : {ex.observationsStructurees.tensionOD}/{ex.observationsStructurees.tensionOG} mmHg</p>
                                        <p class="text-slate-400 truncate">Obs : {ex.observationsTextuelles.anamnese}</p>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </aside>
            );
        }

        // 4. PAGE PATIENT (VUE LONGITUDINALE)
        function PatientPage({ onViewChange }) {
            return (
                <div class="p-6 max-w-5xl mx-auto">
                    <Breadcrumbs currentView="patient" onViewChange={onViewChange} />
                    
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">{mockPatient.prenom} {mockPatient.nom}</h1>
                            <p class="text-sm text-gray-500">Née le {mockPatient.dateNaissance}</p>
                            <p class="mt-2 text-sm text-red-600 font-medium">⚠️ Antécédents : {mockPatient.antecedents}</p>
                        </div>
                        <button 
                            onClick={() => onViewChange('prise-en-charge')}
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg shadow transition cursor-pointer"
                        >
                            ➕ Nouvelle prise en charge
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                            <h2 class="text-md font-bold text-gray-900 mb-3">📈 Dernières Constantes</h2>
                            <div class="p-3 bg-blue-50 text-blue-900 rounded-lg text-xs space-y-1">
                                <p class="font-bold">Tension Oculaire :</p>
                                <p>OD : 16 mmHg | OG : 15 mmHg</p>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 md:col-span-2">
                            <h2 class="text-md font-bold text-gray-900 mb-3">📜 Épisodes de soins passés</h2>
                            {mockPatient.prisesEnCharge.map((pec) => (
                                <div key={pec.id} class="p-4 border border-gray-200 rounded-lg">
                                    <div class="flex justify-between text-sm font-semibold mb-1">
                                        <span>Prise en charge - {pec.date}</span>
                                        <span class="text-green-700 bg-green-100 px-2 py-0.5 rounded text-xs">{pec.statut}</span>
                                    </div>
                                    <p class="text-xs text-gray-600 italic">{pec.conclusion}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // 5. PAGE PRISE EN CHARGE (VUE FOCALE DE SAISIE)
        function CarePage({ onViewChange }) {
            return (
                <div class="flex h-screen w-screen overflow-hidden">
                    <HistorySidebar history={mockPatient.prisesEnCharge} />
                    
                    <main class="flex-1 p-6 overflow-y-auto bg-gray-50 flex flex-col">
                        <Breadcrumbs currentView="prise-en-charge" onViewChange={onViewChange} />
                        
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex-1">
                            <h2 class="text-lg font-bold text-gray-900 border-b border-gray-200 pb-3 mb-4">🩺 Nouvelle consultation (Écriture)</h2>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-700 mb-1">Observations Textuelles (Motif / Anamnèse)</label>
                                    <textarea class="w-full p-2 border border-gray-300 rounded-md text-sm" rows="3" placeholder="Saisir l'anamnèse..."></textarea>
                                </div>

                                <div class="bg-slate-50 p-4 rounded-lg border border-gray-200">
                                    <span class="block text-xs font-bold text-slate-800 mb-2">🔢 Mesures Structurées (Tension)</span>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Œil Droit (mmHg)</label>
                                            <input type="number" class="w-full p-2 border border-gray-300 rounded bg-white text-sm" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Œil Gauche (mmHg)</label>
                                            <input type="number" class="w-full p-2 border border-gray-300 rounded bg-white text-sm" />
                                        </div>
                                    </div>
                                </div>

                                <div class="flex justify-end space-x-2 pt-4">
                                    <button onClick={() => onViewChange('patient')} class="px-4 py-2 border border-gray-300 rounded text-sm text-gray-700 hover:bg-gray-100 cursor-pointer">Annuler</button>
                                    <button onClick={() => onViewChange('patient')} class="px-4 py-2 bg-green-600 text-white font-medium rounded text-sm hover:bg-green-700 cursor-pointer">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // 6. ROUTEUR PRINCIPAL DE L'APP
        function App() {
            const [view, setView] = React.useState('patient'); // 'patient' ou 'prise-en-charge'

            return (
                <div class="w-full h-full">
                    {view === 'patient' ? (
                        <PatientPage onViewChange={setView} />
                    ) : (
                        <CarePage onViewChange={setView} />
                    )}
                </div>
            );
        }

        // Rendu final dans la page
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
