<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mon gros test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 1. DONNÉES DE TEST ÉTENDUES
        const INITIAL_PATIENT = {
            id: "p-001",
            nom: "DURAND",
            prenom: "Jean-Pierre",
            age: 62,
            niss: "62.05.12-123.45",
            antecedents: ["Diabète Type 2", "Hypertension", "Cataracte OD opérée (2023)"],
            prisesEnCharge: [
                {
                    id: "pec-2023",
                    date: "12/10/2023",
                    motif: "Suivi annuel diabète",
                    conclusion: "Stabilité rétinienne, PIO normale.",
                    examens: [
                        { type: "Refraction", od: "Sph +1.25 Cyl -0.50 Axe 90", og: "Sph +1.50 Cyl -0.25 Axe 85" },
                        { type: "Tension", od: "14 mmHg", og: "15 mmHg" }
                    ]
                }
            ]
        };

        // 2. COMPOSANT DE LIGNE DE MESURE STANDARDISÉE (OD / OG)
        const MeasurementRow = ({ label, unit, fields, section, values, onChange }) => (
            <div class="grid grid-cols-12 gap-4 items-center py-3 border-b border-gray-100 last:border-0">
                <div class="col-span-3 text-sm font-medium text-gray-700">{label}</div>
                
                {/* Bloc Œil Droit (OD) - Teinte Bleutée */}
                <div class="col-span-4 flex gap-2">
                    {fields.map(f => (
                        <input 
                            key={`od-${f}`}
                            type="text"
                            placeholder={`${f} OD`}
                            class="w-full p-2 bg-blue-50/40 border border-blue-200 rounded text-xs focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition"
                            value={values[`od_${section}_${f}`] || ''}
                            onChange={(e) => onChange(`od_${section}_${f}`, e.target.value)}
                        />
                    ))}
                </div>
                
                {/* Bloc Œil Gauche (OG) - Teinte Verte */}
                <div class="col-span-4 flex gap-2">
                    {fields.map(f => (
                        <input 
                            key={`og-${f}`}
                            type="text"
                            placeholder={`${f} OG`}
                            class="w-full p-2 bg-emerald-50/40 border border-emerald-200 rounded text-xs focus:bg-white focus:ring-2 focus:ring-emerald-400 outline-none transition"
                            value={values[`og_${section}_${f}`] || ''}
                            onChange={(e) => onChange(`og_${section}_${f}`, e.target.value)}
                        />
                    ))}
                </div>
                
                <div class="col-span-1 text-xs font-bold text-gray-400 uppercase text-right">{unit}</div>
            </div>
        );

        // 3. PAGE PATIENT (VUE LONGITUDINALE)
        const PatientView = ({ patient, onNewPEC }) => (
            <div class="max-w-6xl mx-auto p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <h1 class="text-3xl font-bold text-gray-900">{patient.nom} {patient.prenom}</h1>
                            <span class="px-3 py-1 bg-gray-200 text-gray-700 rounded-full text-xs font-semibold">ID: {patient.id}</span>
                        </div>
                        <p class="text-gray-500">{patient.age} ans • NISS: {patient.niss}</p>
                    </div>
                    <button 
                        onClick={onNewPEC}
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-100 transition cursor-pointer"
                    >
                        + Nouvelle Prise en Charge
                    </button>
                </div>

                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-4 space-y-6">
                        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2 text-sm uppercase tracking-wider text-red-600">
                                ⚠️ Antécédents
                            </h3>
                            <ul class="space-y-2">
                                {patient.antecedents.map((a, i) => (
                                    <li key={i} class="text-sm bg-red-50 text-red-700 p-2 rounded-lg border border-red-100 italic">
                                        • {a}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div class="col-span-8 bg-white p-8 rounded-2xl border border-gray-200 shadow-sm min-h-[400px]">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Historique des Prises en Charge</h2>
                        <div class="relative border-l-2 border-gray-100 ml-4 space-y-8">
                            {patient.prisesEnCharge.map(pec => (
                                <div key={pec.id} class="relative pl-8">
                                    <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-white border-2 border-blue-500"></div>
                                    <div class="flex justify-between mb-2">
                                        <h4 class="font-bold text-gray-800">PEC du {pec.date}</h4>
                                        <span class="text-xs font-medium text-gray-400 bg-gray-100 px-2 py-1 rounded">{pec.motif}</span>
                                    </div>
                                    <p class="text-sm text-gray-600 bg-gray-50 p-3 rounded-xl border border-gray-100 italic">
                                        "{pec.conclusion}"
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        // 4. PAGE PRISE EN CHARGE (VUE FOCALE)
        const CareView = ({ patient, onBack }) => {
            const [form, setForm] = useState({});
            const [images, setImages] = useState([]);

            const handleUpdate = (field, val) => setForm(prev => ({ ...prev, [field]: val }));

            // Simulation de chargement d'une rétinographie réaliste
            const simulateUpload = () => {
                const sampleRetino = "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=300&q=80";
                setImages([...images, sampleRetino]);
            };

            return (
                <div class="flex h-screen w-screen overflow-hidden bg-gray-100">
                    {/* Panneau Latéral Historique en Lecture seule */}
                    <aside class="w-80 bg-slate-900 flex flex-col border-r border-slate-800 text-white">
                        <div class="p-6 border-b border-slate-800">
                            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Historique de Consultation</h2>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 space-y-4">
                            {patient.prisesEnCharge.map(pec => (
                                <div key={pec.id} class="bg-slate-800/60 p-4 rounded-xl border border-slate-700">
                                    <p class="text-[10px] text-blue-400 font-bold mb-1">PEC DU {pec.date}</p>
                                    <p class="text-xs text-slate-300 italic">"{pec.conclusion}"</p>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Zone d'Écriture Active */}
                    <main class="flex-1 overflow-y-auto p-8 flex flex-col">
                        <nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
                            <button onClick={onBack} class="hover:text-blue-600 cursor-pointer">Patient: {patient.nom}</button>
                            <span>/</span>
                            <span class="font-bold text-gray-900">Nouvelle Consultation</span>
                        </nav>

                        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex-1 flex flex-col">
                            <div class="p-6 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                                <h2 class="text-lg font-bold text-gray-800">Saisie de l'Examen</h2>
                                <div class="flex gap-2">
                                    <button class="px-4 py-2 text-sm font-medium text-gray-500 hover:bg-gray-200 rounded-lg cursor-pointer" onClick={onBack}>Annuler</button>
                                    <button class="px-5 py-2 text-sm font-bold bg-green-600 text-white rounded-lg shadow hover:bg-green-700 cursor-pointer" onClick={onBack}>Enregistrer</button>
                                </div>
                            </div>

                            <div class="p-8 space-y-8 flex-1">
                                {/* Section 1 : Anamnèse */}
                                <section>
                                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">1. Anamnèse / Motif</label>
                                    <textarea 
                                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" 
                                        rows="2" 
                                        placeholder="Saisir les observations textuelles..."
                                    ></textarea>
                                </section>

                                {/* Section 2 : Mesures Structurées */}
                                <section class="space-y-4">
                                    <div class="flex justify-between items-end border-b border-gray-100 pb-2">
                                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">2. Mesures Structurées</label>
                                        <div class="flex gap-20 text-[10px] font-bold text-gray-400 mr-16">
                                            <span>OEIL DROIT (OD)</span>
                                            <span>OEIL GAUCHE (OG)</span>
                                        </div>
                                    </div>
                                    
                                    <div class="bg-gray-50/50 p-4 rounded-xl border border-gray-100 space-y-1">
                                        <MeasurementRow label="Réfraction Objective" unit="D" fields={["Sph", "Cyl", "Axe"]} section="obj" values={form} onChange={handleUpdate} />
                                        <MeasurementRow label="Réfraction Subjective" unit="VA" fields={["Sph", "Cyl", "Axe", "Ac"]} section="subj" values={form} onChange={handleUpdate} />
                                        <MeasurementRow label="Kératométrie" unit="mm" fields={["K1", "K2", "Ax"]} section="ker" values={form} onChange={handleUpdate} />
                                        <MeasurementRow label="Pachymétrie" unit="µm" fields={["Centre"]} section="pach" values={form} onChange={handleUpdate} />
                                        <MeasurementRow label="Tension Oculaire" unit="mmHg" fields={["T"]} section="tens" values={form} onChange={handleUpdate} />
                                    </div>
                                </section>

                                {/* Section 3 : Rétinographies */}
                                <section>
                                    <div class="flex justify-between items-center mb-3">
                                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">3. Rétinographies / Imagerie</label>
                                        <button 
                                            type="button"
                                            onClick={simulateUpload}
                                            class="text-xs font-bold text-blue-600 border border-blue-200 bg-blue-50/50 hover:bg-blue-50 px-3 py-1.5 rounded-lg cursor-pointer transition"
                                        >
                                            + Importer une rétinographie
                                        </button>
                                    </div>

                                    <div class="grid grid-cols-4 gap-4">
                                        {images.length === 0 ? (
                                            <div class="col-span-4 border-2 border-dashed border-gray-200 rounded-xl h-24 flex items-center justify-center text-gray-400 text-xs">
                                                Aucune image importée pour cette session.
                                            </div>
                                        ) : (
                                            images.map((img, idx) => (
                                                <div key={idx} class="relative aspect-square rounded-xl overflow-hidden border border-gray-200 shadow-sm bg-black group">
                                                    <img src={img} class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition" />
                                                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition cursor-pointer">
                                                        <span class="text-white text-[10px] font-bold border border-white px-2 py-1 rounded">Visualiser</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </section>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // 5. ROUTEUR PRINCIPAL
        function App() {
            const [view, setView] = useState('patient'); // 'patient' ou 'care'

            return (
                <div class="w-screen h-screen">
                    {view === 'patient' ? (
                        <PatientView patient={INITIAL_PATIENT} onNewPEC={() => setView('care')} />
                    ) : (
                        <CareView patient={INITIAL_PATIENT} onBack={() => setView('patient')} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
